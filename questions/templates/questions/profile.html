{% extends 'questions/layout/base.html' %}

{% load static %}
    {% block title %}
    <title>AskPupkin - Профиль</title>
    {% endblock %}
{% block content %}

 <h2 class="page-title">Настройки: Yuri_Shevchuk</h2>

            <form class="settings-form">
                <div class="form-group">
                    <label class="form-label">Логин</label>
                    <input type="text" class="form-input" value="Yuri_Shevchuk">
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input error-field" value="invalid-email">
                    <span class="error-text">Вы ввели невалидный email</span>
                </div>

                <div class="form-group">
                    <label class="form-label">Никнейм</label>
                    <input type="text" class="form-input" value="Юрий Юлианович">
                </div>

                <div class="form-group">
                    <label class="form-label">Аватар</label>
                    <div class="avatar-edit-row">
                        <img src="{% static 'questions/avatar.jpg' %}" alt="Current" class="avatar-lg">
                        <input type="file" class="form-input-file">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-save">Сохранить</button>
            </form>
            
 {% endblock %}
