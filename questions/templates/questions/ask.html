{% extends 'questions/layout/base.html' %}

{% load static %}
    {% block title %}
    <title>AskPupkin - Задать вопрос</title>
    {% endblock %}
{% block content %}

        <div class = "page-title">Задайте вопрос</div>
<form class="ask-form">
    <div class="form-group">
        <label>Заголовок</label>
        <input type="text" placeholder="Например: Как в C++..." class="form-control">
        <small class="hint">Максимум 255 символов</small>
    </div>
    <div class="form-group">
        <label>Текст</label>
        <textarea rows="10" class="form-control"></textarea>
    </div>
    <div class="form-group">
        <label>Теги</label>
        <input type="text" placeholder="tag1, tag2" class="form-control">
    </div>
    <button type="submit" class="btn btn-primary">Спросить!</button>
</form>
            
 {% endblock %}
