<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskPupkin - Регистрация</title>
    <link rel="icon" href="static/img/favicon.ico">
    <link rel="stylesheet" href="static/css/main.css">
</head>
<body>

    <header class="header">
        <div class="container header-content">
            <a class="logo" href="index.html">AskPupkin</a>
            
            <form class="search-form">
                <input type="search" placeholder="Поиск вопроса...">
            </form>

            <div class="user-nav">
                <a href="ask.html" class="btn btn-primary hide-mobile">Спросить!</a>
                <a href="login.html" class="link-light">Вход</a>
                <a href="signup.html" class="btn btn-outline">Регистрация</a>
            </div>
        </div>
    </header>

    <main class="container main-layout">
        <section class="content">
            <div class="auth-container">
                <h1 class="page-title">Регистрация</h1>
                
                <div class="alert alert-danger">Такой email уже зарегистрирован</div>

                <form class="auth-form" action="#" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="username" class="form-label">Логин</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="ivan_ivanov">
                        <small class="error-text">Имя пользователя слишком короткое</small>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control error-input" id="email" name="email" placeholder="example@mail.ru">
                        <small class="error-text">Вы ввели невалидный email</small>
                    </div>

                    <div class="form-group">
                        <label for="nickname" class="form-label">Никнейм</label>
                        <input type="text" class="form-control" id="nickname" name="nickname" placeholder="Ivan">
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password">
                    </div>

                    <div class="form-group">
                        <label for="password_repeat" class="form-label">Повторите пароль</label>
                        <input type="password" class="form-control" id="password_repeat" name="password_repeat">
                    </div>

                    <div class="form-group">
                        <label for="avatar" class="form-label">Аватар</label>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <img src="static/img/default.jpg" alt="Preview" class="avatar-sm">
                            <input type="file" class="form-control" id="avatar" name="avatar" accept="image/*">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-dark" style="width: 100%; margin-bottom: 1rem;">Зарегистрироваться</button>
                    
                    <div style="text-align: center;">
                        <span>Уже есть аккаунт?</span>
                        <a href="login.html" class="link-primary">Войти</a>
                    </div>
                </form>
            </div>
        </section>

        <aside class="sidebar">
            <section class="sidebar-block">
                <h5 class="sidebar-title">Popular Tags</h5>
                <div class="tags-cloud">
                    <a href="indexTaged.html" class="tag">cpp</a>
                    <a href="indexTaged.html" class="tag">nginx</a>
                    <a href="indexTaged.html" class="tag">python</a>
                </div>
            </section>
            
            <section class="sidebar-block">
                <h5 class="sidebar-title">Best Members</h5>
                <ul class="members-list">
                    <li><a href="#">Yuri_Shevchuk</a></li>
                    <li><a href="#">Backend_Master</a></li>
                </ul>
            </section>
        </aside>
    </main>

    <footer class="footer">
        <div class="container">
            <small>&copy; 2026 VK Education Web Course</small>
        </div>
    </footer>

</body>
</html>
